<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <div class="brand-icon">
            <img src="ai.png" alt="AI" />
          </div>
          <span class="brand-name">AI Chatbot</span>
        </div>
        <button class="new-chat-btn" onclick="clearChat()">+ New Chat</button>
      </div>
      <div class="sidebar-menu">
        <div class="menu-item active">💬 Chat</div>
        <div class="menu-item">🖼️ Image Analysis</div>
        <div class="menu-item">📄 Summarize</div>
        <div class="menu-item">🌐 Translate</div>
      </div>
      <div class="sidebar-bottom">
        <div class="user-info">
          <img src="user.png" alt="User" class="user-img" />
          <span>Ananya</span>
        </div>
      </div>
    </aside>

    <!-- MAIN CHAT -->
    <div class="chat-main">

      <!-- HEADER -->
      <div class="chat-header">
        <div class="header-left">
          <img src="ai.png" alt="AI" class="header-avatar" />
          <div class="header-info">
            <h2>AI Assistant</h2>
            <div class="online-status">
              <span class="dot"></span> Online
            </div>
          </div>
        </div>
        <button class="clear-btn" onclick="clearChat()">🗑️ Clear</button>
      </div>

      <!-- MESSAGES -->
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <img src="ai.png" alt="AI" class="welcome-img" />
          <h2>Hello! How can I help you? 👋</h2>
          <p>Ask me anything. I'm powered by Gemini AI.</p>
          <div class="chips">
            <button class="chip" onclick="sendChip('What is artificial intelligence?')">What is AI?</button>
            <button class="chip" onclick="sendChip('Write a poem about nature')">Write a poem</button>
            <button class="chip" onclick="sendChip('Explain machine learning simply')">Machine learning</button>
            <button class="chip" onclick="sendChip('Give me a fun fact')">Fun fact</button>
          </div>
        </div>
      </div>

      <!-- INPUT -->
      <div class="input-area">
        <div class="input-box">
          <input
            type="text"
            id="userInput"
            placeholder="Type your message here..."
            autocomplete="off"
          />
          <button class="img-btn" id="imageBtn" title="Upload image">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <button class="send-btn" id="sendBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <input type="file" accept="image/*" id="imageInput" hidden />
        <p class="disclaimer">AI can make mistakes. Please verify important information.</p>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
